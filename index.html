<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Chart Pro - Hands Free Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d; --bg2:#161616; --bg3:#1f1f1f; --bg4:#2a2a2a; --bg5:#383838;
  --text:#ede9e0; --muted:#999; --muted2:#6a6a6a;
  --border:#2e2e2e; --border2:#444; --accent:#e8c547;
  --green:#4caf6e; --red:#c85a5a; --blue:#5aafc8;
  font-family:'Courier New',Courier,monospace; font-size:16px;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── CREATIVE UI ANIMATIONS ─── */
@keyframes popIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes sectionEntrance { from { opacity: 0; transform: scale(0.9) translateX(-20px); } to { opacity: 1; transform: scale(1) translateX(0); } }
@keyframes fillFlash { 0% { background: transparent; } 50% { background: var(--accent); } 100% { background: transparent; } }
@keyframes focusZoom { from { transform: scale(1); } to { transform: scale(1.05); } }

/* ── VIEWS ── */
.view {
    width:100%; height:100%; display:none; flex-direction:column;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.view.active { display:flex; opacity: 1; transform: translateY(0); }

/* ── AUTH UI ── */
#view-auth { justify-content: center; align-items: center; text-align: center; background: var(--bg); }
.auth-box { 
    background: var(--bg2); padding: 40px; border-radius: 12px; border: 1px solid var(--border); 
    width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.auth-input { 
    width: 100%; padding: 12px; margin: 10px 0; background: var(--bg3); 
    border: 1px solid var(--border2); color: var(--text); border-radius: 5px; 
    font-family: inherit; outline: none;
}
.auth-input:focus { border-color: var(--accent); }
.shake-err { animation: shake 0.3s ease-in-out 2; }

/* ── LIBRARY VIEW ── */
#lib-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 36px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#lib-title{font-size:28px;font-weight:700;letter-spacing:5px;color:var(--accent);text-transform:uppercase}
#lib-body{flex:1;overflow-y:auto;padding:32px 36px}

.song-card{
  display:flex;align-items:center;gap:20px;
  padding:20px 24px;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  cursor:pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideInRight 0.4s ease backwards;
}
.song-card:hover{ 
    background:var(--bg3); border-color:var(--accent); 
    transform: translateX(8px); box-shadow: -4px 0 0 var(--accent);
}
.song-card-strips{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.song-card-strip{height:8px;border-radius:2px;min-width:14px}

/* ── EDITOR VIEW ── */
#ed-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#song-name-input{
  background:transparent;border:none;border-bottom:1px solid var(--border2);
  color:var(--accent);font-size:20px;font-weight:700;
  font-family:inherit;outline:none;flex:1;padding:4px 0;
}
.ed-header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}

/* YouTube Input */
#yt-sync-wrap { padding: 10px 24px; background: #222; border-bottom: 1px solid #333; display: flex; gap: 15px; align-items: center; }
#yt-url-input { background: #000; border: 1px solid #444; color: #fff; padding: 5px 10px; flex: 1; font-size: 12px; border-radius: 4px; }

/* ── EDITOR MAIN ── */
#ed-main{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:260px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
}
.modifier-group { padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); }
.mod-btn { padding: 4px 8px; font-size: 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--muted); }
.mod-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

#section-palette{padding:12px}
.palette-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  margin-bottom:4px;border-radius:5px;cursor:pointer;
  font-size:13px; transition:all .12s;
}
.palette-item:hover{background:var(--bg3); transform: scale(1.02); }

/* ── CHART ── */
#chart-area{flex:1;overflow-y:auto;padding:22px}
.section-block{
  display:flex;margin-bottom:8px;border-radius:6px;overflow:hidden;
  border:1px solid var(--border); transition: all 0.2s;
  animation: sectionEntrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
.sec-bar{width:8px;flex-shrink:0}
.sec-body{flex:1;padding:12px 16px;background:var(--bg2);min-width:0}

/* Variant & TS Controls */
.sec-meta-controls { display: flex; gap: 10px; margin-top: 5px; align-items: center; font-size: 11px; color: var(--muted); }
.sec-variant-select, .sec-ts-input, .sec-color-input { background: #000; border: 1px solid #444; color: #eee; padding: 2px 5px; border-radius: 3px; }

/* ── PERFORMANCE VIEW ── */
#perf-overlay{ position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column; }
#perf-overlay.active{display:flex;}

/* Fill Flash HUD */
#fill-hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 300;
    border: 0px solid var(--accent); transition: border-width 0.1s;
}
#fill-hud.active { border-width: 20px; animation: fillFlash 0.4s infinite; }

#perf-topbar{ display:flex;align-items:center;justify-content:space-between; padding:14px 28px;border-bottom:1px solid #1a1a1a; }
#perf-video-container { width: 320px; height: 180px; position: fixed; bottom: 80px; right: 20px; border: 2px solid #333; background: #000; z-index: 250; transition: 0.3s; }
#perf-video-container:hover { transform: scale(1.5); transform-origin: bottom right; }

#perf-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center; position:relative}
#perf-section-name{ font-size:94px;font-weight:700;letter-spacing:12px;text-transform:uppercase; transition: 0.4s; }

/* ── BUTTONS ── */
.btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:9px 18px;font-size:13px; cursor:pointer;border-radius:5px;text-transform:uppercase;
  transition:all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.accent{background:var(--accent);color:#000;font-weight:700}
.btn.perform{background:var(--green);color:#000;font-weight:700; padding:12px 30px;}

#save-toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:#1a1a1a;border:1px solid var(--border2);color:var(--muted);
  padding:10px 18px;border-radius:5px; opacity:0; transition: 0.3s;
}
#save-toast.show{opacity:1;}
</style>
</head>
<body>

<div id="view-auth" class="view">
  <div class="auth-box">
    <h2 style="color:var(--accent); letter-spacing: 5px; margin-bottom: 20px;">DRUM CHARTS</h2>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button class="btn accent" style="flex:1" onclick="handleAuth('login')">Login</button>
      <button class="btn" style="flex:1" onclick="handleAuth('signup')">Sign Up</button>
    </div>
    <p id="auth-error" style="color:var(--red); font-size: 13px; margin-top: 15px;"></p>
  </div>
</div>

<div id="view-library" class="view">
  <div id="lib-header">
    <div>
      <div id="lib-title">🥁 Drum Charts</div>
      <div id="lib-subtitle">Your song library</div>
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn new-song" onclick="newSong()">+ NEW SONG</button>
        <button class="btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>
  <div id="lib-body">
    <div id="lib-empty" style="display:none"><span>🥁</span>No songs yet.</div>
    <div id="song-list"></div>
  </div>
</div>

<div id="view-editor" class="view">
  <div id="ed-header">
    <button class="btn" onclick="goLibrary()">← Library</button>
    <input id="song-name-input" placeholder="SONG TITLE..." oninput="saveSongMeta()">
    <div class="ed-header-right">
      <div class="bpm-wrap"><label>BPM</label><input type="number" id="bpm-input" value="120" oninput="saveSongMeta()"></div>
      <button class="btn perform" onclick="startPerf()">▶ PERFORM</button>
    </div>
  </div>

  <div id="yt-sync-wrap">
    <label style="font-size: 11px; color: var(--muted);">YOUTUBE URL:</label>
    <input id="yt-url-input" placeholder="https://www.youtube.com/watch?v=..." oninput="saveSongMeta()">
    <button class="btn" style="padding: 4px 10px; font-size: 10px;" onclick="testYoutube()">Test Video</button>
  </div>

  <div id="ed-main">
    <div id="sidebar">
      <div class="sidebar-section-label">Modifiers</div>
      <div class="modifier-group">
          <button class="mod-btn" id="mod-pre" onclick="toggleModifier('Pre')">PRE</button>
          <button class="mod-btn" id="mod-post" onclick="toggleModifier('Post')">POST</button>
          <button class="mod-btn" id="mod-none" onclick="toggleModifier('')" class="active">NONE</button>
      </div>
      <div class="sidebar-section-label">Add Section</div>
      <div id="section-palette"></div>
    </div>
    <div id="chart-area">
      <div id="chart-list"></div>
    </div>
  </div>
</div>

<div id="perf-overlay">
  <div id="fill-hud"></div>
  <div id="perf-topbar">
    <div id="perf-song">TITLE</div>
    <div style="display:flex; gap:10px;">
        <button class="btn" id="sync-mode-btn" onclick="toggleSyncMode()">SYNC MODE: OFF</button>
        <button class="btn" onclick="stopPerf()">✕ EXIT</button>
    </div>
  </div>

  <div id="perf-mode-bar">
    <div id="countdown-ring-wrap">
      <svg id="countdown-ring-svg" width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <circle id="ring-arc" cx="16" cy="16" r="13" fill="none" stroke="#555" stroke-width="3"
          stroke-dasharray="81.7" stroke-dashoffset="81.7" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="auto-status">WAITING FOR START</div>
  </div>

  <div id="perf-body">
    <div id="perf-prev-val" style="color: #222; font-size: 20px; margin-bottom: 20px;">PREVIOUS</div>
    <div id="perf-section-name">SECTION</div>
    <div id="perf-section-sub" style="font-size: 24px; color: var(--muted);">8 BARS</div>
    <div id="perf-notes-disp" style="margin-top: 20px; font-style: italic;">Notes here...</div>
    
    <div id="bar-ticker-wrap">
      <div id="bar-ticker-num">1</div>
      <div id="bar-ticker-label">bar</div>
    </div>
  </div>

  <div id="perf-video-container">
      <div id="yt-player"></div>
  </div>

  <div id="perf-nav" style="padding: 20px; display: flex; justify-content: center; gap: 20px; background: #000;">
    <button class="btn" style="padding: 15px 40px" onclick="perfBack()">BACK</button>
    <button class="btn accent" style="padding: 15px 60px" onclick="window.markSectionSync() || perfNext()">NEXT / MARK</button>
  </div>
</div>

<div id="save-toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCdhJhDOeqYlR2xrVVUKXAs7Cms6tiTRJ8",
  authDomain: "chart-maker-firebase.firebaseapp.com",
  projectId: "chart-maker-firebase",
  storageBucket: "chart-maker-firebase.firebasestorage.app",
  messagingSenderId: "892558984",
  appId: "1:892558984:web:9eb403a2b41d6c7299093d",
  measurementId: "G-TV2HYST7DF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───────────────────────────────────────────
let library = [];     
let currentUser = null;
let currentSongId = null;
let activeModifier = '';
let perfIdx = 0;
let syncModeActive = false;

// YouTube API
let ytPlayer = null;
let ytInterval = null;

const TYPES = [
  {id:'intro', label:'Intro', color:'#5bc0de', key:'i'},
  {id:'verse', label:'Verse', color:'#4caf6e', key:'v'},
  {id:'chorus', label:'Chorus', color:'#e8c547', key:'c'},
  {id:'bridge', label:'Bridge', color:'#e87d47', key:'b'},
  {id:'outro', label:'Outro', color:'#888', key:'o'}
];
const TM = {}; TYPES.forEach(t => TM[t.id] = t);

// ─── AUTH CORE ───────────────────────────────────────
window.handleAuth = async (mode) => {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    try {
        if(mode === 'login') await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
    } catch(e) { errEl.textContent = e.message; }
};
window.handleLogout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('view-auth').classList.remove('active');
        document.getElementById('view-library').classList.add('active');
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) library = docSnap.data().library || [];
        renderLibrary();
    } else {
        currentUser = null;
        document.getElementById('view-library').classList.remove('active');
        document.getElementById('view-auth').classList.add('active');
    }
});

// ─── STORAGE ─────────────────────────────────────────
window.save = async function(){
    if(currentUser) {
        await setDoc(doc(db, "users", currentUser.uid), { library });
        showToast('✓ Cloud Synced');
    }
}

function showToast(msg) {
    const t = document.getElementById('save-toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

// ─── APP LOGIC ───────────────────────────────────────
window.newSong = () => {
    let s = { id: Date.now(), name: 'New Song', bpm: 120, ts: 4, ytUrl: '', sections: [] };
    library.push(s); window.save(); openSong(s.id);
};

window.openSong = (id) => {
    currentSongId = id;
    const s = library.find(x => x.id === id);
    document.getElementById('song-name-input').value = s.name;
    document.getElementById('bpm-input').value = s.bpm;
    document.getElementById('yt-url-input').value = s.ytUrl || '';
    window.showView('editor');
    renderChart();
};

window.saveSongMeta = () => {
    const s = library.find(x => x.id === currentSongId);
    s.name = document.getElementById('song-name-input').value;
    s.bpm = parseInt(document.getElementById('bpm-input').value);
    s.ytUrl = document.getElementById('yt-url-input').value;
    window.save();
};

window.toggleModifier = (m) => {
    activeModifier = m;
    document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mod-' + (m.toLowerCase() || 'none')).classList.add('active');
};

window.addSection = (typeId) => {
    const s = library.find(x => x.id === currentSongId);
    s.sections.push({
        id: Date.now(), typeId, modifier: activeModifier, 
        variant: 'A', bars: 8, repeats: 1, notes: '', 
        color: TM[typeId].color, localTS: 4, startTime: 0 
    });
    renderChart();
};

// ─── SMART NUMBERING & RENDER ───
function getSectionLabel(sec, index, allSections) {
    let label = (sec.modifier ? sec.modifier + '-' : '') + TM[sec.typeId].label;
    if (sec.variant !== 'A') label += ' ' + sec.variant;
    
    // Auto-number logic
    let count = 0;
    for(let i=0; i<=index; i++) {
        if(allSections[i].typeId === sec.typeId && allSections[i].variant === sec.variant) count++;
    }
    return label + ' ' + count;
}

window.renderChart = () => {
    const s = library.find(x => x.id === currentSongId);
    const list = document.getElementById('chart-list');
    list.innerHTML = s.sections.map((sec, i) => `
        <div class="section-block" style="animation-delay: ${i*0.05}s; border-left: 10px solid ${sec.color}">
            <div class="sec-body">
                <div class="sec-row1">
                    <span class="sec-type-label" style="color:${sec.color}">${getSectionLabel(sec, i, s.sections)}</span>
                    <div class="sec-row1-right">
                        <span class="repeat-pill" onclick="cycleRepeats(${i})">×${sec.repeats}</span>
                        <input class="bars-input" type="number" value="${sec.bars}" onchange="updateBars(${i}, this.value)">
                        <button class="btn danger" style="padding:2px 8px" onclick="removeSec(${i})">✕</button>
                    </div>
                </div>
                <div class="sec-meta-controls">
                    Var: <select class="sec-variant-select" onchange="updateVariant(${i}, this.value)">
                        <option value="A" ${sec.variant==='A'?'selected':''}>A</option>
                        <option value="B" ${sec.variant==='B'?'selected':''}>B</option>
                        <option value="C" ${sec.variant==='C'?'selected':''}>C</option>
                    </select>
                    TS: <input type="number" class="sec-ts-input" style="width:40px" value="${sec.localTS}" onchange="updateLocalTS(${i}, this.value)">
                    Color: <input type="color" class="sec-color-input" value="${sec.color}" onchange="updateColor(${i}, this.value)">
                    Sync: <span style="color:var(--accent)">${sec.startTime.toFixed(1)}s</span>
                </div>
                <input class="sec-notes-input" type="text" value="${sec.notes}" placeholder="Add notes..." onchange="updateNotes(${i}, this.value)">
            </div>
        </div>
    `).join('');
};

// ─── PERFORMANCE & YOUTUBE SYNC ───
window.startPerf = () => {
    const s = library.find(x => x.id === currentSongId);
    perfIdx = 0;
    document.getElementById('perf-overlay').classList.add('active');
    document.getElementById('perf-song').textContent = s.name;
    
    // Load YouTube
    if(s.ytUrl) {
        const vidId = s.ytUrl.split('v=')[1]?.split('&')[0];
        if(ytPlayer) ytPlayer.loadVideoById(vidId);
        else initYoutube(vidId);
    }
    renderPerf();
};

function initYoutube(id) {
    ytPlayer = new YT.Player('yt-player', {
        height: '100%', width: '100%', videoId: id,
        events: { 'onStateChange': onPlayerStateChange }
    });
}

function onPlayerStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        ytInterval = setInterval(checkSync, 100);
    } else {
        clearInterval(ytInterval);
    }
}

function checkSync() {
    if(syncModeActive) return; // Don't auto-jump while marking
    const s = library.find(x => x.id === currentSongId);
    const curTime = ytPlayer.getCurrentTime();
    
    // Find section matching current time
    let foundIdx = -1;
    for(let i = s.sections.length-1; i >= 0; i--) {
        if(curTime >= s.sections[i].startTime) {
            foundIdx = i; break;
        }
    }
    
    if(foundIdx !== -1 && foundIdx !== perfIdx) {
        perfIdx = foundIdx;
        renderPerf();
    }
}

window.toggleSyncMode = () => {
    syncModeActive = !syncModeActive;
    document.getElementById('sync-mode-btn').textContent = "SYNC MODE: " + (syncModeActive ? "ON" : "OFF");
};

window.markSectionSync = () => {
    if(!syncModeActive || !ytPlayer) return false;
    const s = library.find(x => x.id === currentSongId);
    s.sections[perfIdx].startTime = ytPlayer.getCurrentTime();
    showToast('Marked ' + s.sections[perfIdx].typeId);
    window.save();
    perfNext();
    return true;
};

function renderPerf() {
    const s = library.find(x => x.id === currentSongId);
    const sec = s.sections[perfIdx];
    const prev = s.sections[perfIdx-1];
    
    document.getElementById('perf-section-name').textContent = getSectionLabel(sec, perfIdx, s.sections);
    document.getElementById('perf-section-name').style.color = sec.color;
    document.getElementById('perf-section-sub').textContent = sec.bars + " BARS " + (sec.repeats > 1 ? "×"+sec.repeats : "");
    document.getElementById('perf-notes-disp').textContent = sec.notes;
    document.getElementById('perf-prev-val').textContent = prev ? "PREV: " + getSectionLabel(prev, perfIdx-1, s.sections) : "—";
}

window.perfNext = () => {
    const s = library.find(x => x.id === currentSongId);
    if(perfIdx < s.sections.length-1) { perfIdx++; renderPerf(); }
};

window.perfBack = () => {
    if(perfIdx > 0) { perfIdx--; renderPerf(); }
};

window.stopPerf = () => {
    if(ytPlayer) ytPlayer.pauseVideo();
    document.getElementById('perf-overlay').classList.remove('active');
};

// ─── HELPERS ───
window.updateBars = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].bars = parseInt(v); renderChart(); };
window.updateVariant = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].variant = v; renderChart(); };
window.updateColor = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].color = v; renderChart(); };
window.updateLocalTS = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].localTS = v; renderChart(); };
window.removeSec = (i) => { library.find(x=>x.id===currentSongId).sections.splice(i,1); renderChart(); };
window.cycleRepeats = (i) => { let s = library.find(x=>x.id===currentSongId).sections[i]; s.repeats = (s.repeats % 4) + 1; renderChart(); };
window.showView = (v) => { document.querySelectorAll('.view').forEach(x=>x.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); };
window.goLibrary = () => { window.save(); window.showView('library'); renderLibrary(); };

// Palette Build
const pal = document.getElementById('section-palette');
TYPES.forEach(t => {
    const el = document.createElement('div');
    el.className='palette-item';
    el.innerHTML=`<div style="width:12px;height:12px;border-radius:50%;background:${t.color}"></div><span>${t.label}</span>`;
    el.onclick = () => window.addSection(t.id);
    pal.appendChild(el);
});

// Load YT API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
