<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Chart Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d; --bg2:#161616; --bg3:#1f1f1f; --bg4:#2a2a2a; --bg5:#383838;
  --text:#ede9e0; --muted:#999; --muted2:#6a6a6a;
  --border:#2e2e2e; --border2:#444; --accent:#e8c547;
  --green:#4caf6e; --red:#c85a5a; --blue:#5aafc8;
  font-family:'Courier New',Courier,monospace; font-size:16px;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── NEW UI ANIMATIONS ─── */
@keyframes popIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes sectionEntrance { from { opacity: 0; transform: scale(0.9) translateX(-20px); } to { opacity: 1; transform: scale(1) translateX(0); } }
@keyframes fillFlash { 0% { box-shadow: inset 0 0 0px var(--accent); } 50% { box-shadow: inset 0 0 50px var(--accent); background: rgba(232, 197, 71, 0.1); } 100% { box-shadow: inset 0 0 0px var(--accent); } }

/* ── VIEWS ── */
#view-library,#view-editor,#view-auth{
    width:100%;height:100%;display:none;flex-direction:column;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#view-library.active,#view-editor.active,#view-auth.active{display:flex; opacity: 1; transform: translateY(0);}

/* ── AUTH UI ── */
#view-auth { justify-content: center; align-items: center; text-align: center; background: var(--bg); }
.auth-box { 
    background: var(--bg2); padding: 40px; border-radius: 12px; border: 1px solid var(--border); 
    width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.auth-input { 
    width: 100%; padding: 12px; margin: 10px 0; background: var(--bg3); 
    border: 1px solid var(--border2); color: var(--text); border-radius: 5px; 
    font-family: inherit; outline: none;
}
.auth-input:focus { border-color: var(--accent); }
.shake-err { animation: shake 0.3s ease-in-out 2; }

/* ── LIBRARY VIEW ── */
#lib-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 36px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#lib-title{font-size:28px;font-weight:700;letter-spacing:5px;color:var(--accent);text-transform:uppercase}
#lib-subtitle{font-size:13px;color:var(--muted);letter-spacing:2px;margin-top:5px}
#lib-body{flex:1;overflow-y:auto;padding:32px 36px}
#lib-body::-webkit-scrollbar{width:5px}
#lib-body::-webkit-scrollbar-thumb{background:var(--border2)}

#lib-empty{
  text-align:center;padding:100px 40px;color:var(--muted2);
  font-size:15px;letter-spacing:2px;text-transform:uppercase;
  border:1px dashed var(--border2);border-radius:8px;margin:20px;
}
#lib-empty span{display:block;font-size:42px;margin-bottom:20px;color:var(--border2)}

.song-card{
  display:flex;align-items:center;gap:20px;
  padding:20px 24px;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  cursor:pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideInRight 0.4s ease backwards;
}
.song-card:hover{ background:var(--bg3); border-color:var(--accent); transform: translateX(8px); }
.song-card-left{flex:1;min-width:0}
.song-card-name{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-card-meta{font-size:13px;color:var(--muted);letter-spacing:1px;margin-top:6px}
.song-card-strips{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.song-card-strip{height:8px;border-radius:2px;min-width:14px}
.song-card-actions{display:flex;gap:8px;flex-shrink:0}

/* ── EDITOR VIEW ── */
#ed-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#back-btn{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  padding:9px 16px;font-family:inherit;font-size:13px;
  letter-spacing:1px;cursor:pointer;border-radius:5px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;
}
#back-btn:hover{border-color:var(--accent);color:var(--accent); transform: translateX(-3px); }
#song-name-input{
  background:transparent;border:none;border-bottom:1px solid var(--border2);
  color:var(--accent);font-size:20px;font-weight:700;
  font-family:inherit;letter-spacing:3px;text-transform:uppercase;
  outline:none;flex:1;padding:4px 0;min-width:0;
}
#song-name-input::placeholder{color:var(--muted2)}
#song-name-input:focus{border-bottom-color:var(--accent)}
.ed-header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.bpm-wrap{display:flex;align-items:center;gap:8px}
.bpm-wrap label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
#bpm-input{
  width:68px;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:16px;
  padding:6px 10px;border-radius:5px;text-align:center;outline:none;
}
#bpm-input:focus{border-color:var(--accent)}

/* YouTube Input Area */
#yt-sync-bar { padding: 10px 24px; background: #222; border-bottom: 1px solid #333; display: flex; gap: 15px; align-items: center; }
#yt-url-input { background: #000; border: 1px solid #444; color: #fff; padding: 6px 12px; flex: 1; font-size: 12px; border-radius: 4px; outline: none; }
#yt-url-input:focus { border-color: var(--accent); }

/* ── EDITOR MAIN ── */
#ed-main{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:260px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2)}

/* Modifier Toggle Buttons */
.modifier-group { padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); }
.mod-btn { flex: 1; padding: 6px; font-size: 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--muted); text-transform: uppercase; }
.mod-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

.sidebar-section-label{
  padding:14px 16px 10px;font-size:11px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);
}
#section-palette{padding:12px 12px 0}
.palette-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  margin-bottom:4px;border-radius:5px;cursor:pointer;
  font-size:13px;letter-spacing:1px;text-transform:uppercase;
  border:1px solid transparent;transition:all .12s;user-select:none;
}
.palette-item:hover{background:var(--bg3); transform: scale(1.02); }
.palette-item .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

#sidebar-footer{padding:14px;border-top:1px solid var(--border);margin-top:auto}
#global-notes{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:13px;
  padding:10px;resize:none;border-radius:5px;height:90px;outline:none;
}

/* ── CHART ── */
#chart-area{flex:1;overflow-y:auto;padding:22px}
#chart-area::-webkit-scrollbar{width:5px}
#chart-area::-webkit-scrollbar-thumb{background:var(--border2)}
#drop-hint{
  text-align:center;color:var(--muted2);font-size:13px;letter-spacing:2px;
  text-transform:uppercase;padding:70px 30px;
  border:1px dashed var(--border2);border-radius:8px;
}
.section-block{
  display:flex;margin-bottom:8px;border-radius:6px;overflow:hidden;
  border:1px solid var(--border);cursor:grab; transition: all 0.2s;
  animation: sectionEntrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
.section-block.dragging{opacity:.35}
.sec-bar{width:8px;flex-shrink:0}
.sec-body{flex:1;padding:12px 16px;background:var(--bg2);min-width:0}

/* Section Metadata Controls (Pro Edition) */
.sec-pro-row { display: flex; gap: 12px; align-items: center; margin-top: 8px; font-size: 11px; color: var(--muted); border-top: 1px solid #222; padding-top: 8px; }
.pro-input { background: #000; border: 1px solid #444; color: #eee; padding: 2px 6px; border-radius: 3px; font-family: inherit; font-size: 11px; }
.fill-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; }

.sec-row1{display:flex;align-items:center;gap:12px}
.sec-type-label{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.sec-row1-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.repeat-pill{
  font-size:11px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--muted);padding:3px 10px;border-radius:10px;cursor:pointer;
}
.repeat-pill:hover{border-color:var(--accent);color:var(--accent)}
.bars-input{
  width:50px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:14px;
  padding:4px 6px;border-radius:4px;text-align:center;outline:none;
}
.ico-btn{
  background:transparent;border:none;color:var(--muted2);cursor:pointer;
  font-size:16px;padding:4px 6px;border-radius:4px;
}
.ico-btn:hover{color:var(--text);background:var(--bg4)}
.sec-notes-input{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--border2);color:#bbb;
  font-family:inherit;font-size:13px;
  padding:4px 0;outline:none;
}

/* ── PERFORMANCE VIEW ── */
#perf-overlay{
  position:fixed;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;
}
#perf-overlay.active{display:flex; animation: popIn 0.4s ease;}

/* Fill HUD Warning */
#fill-hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 300;
    border: 0px solid var(--accent); transition: border-width 0.1s;
}
#fill-hud.active { border-width: 25px; animation: fillFlash 0.5s infinite; }

#perf-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid #1a1a1a;flex-shrink:0;
}
#perf-song{font-size:13px;letter-spacing:3px;color:#555;text-transform:uppercase}

/* YouTube Player Container */
#perf-player-wrap { 
    width: 320px; height: 180px; position: fixed; bottom: 100px; right: 30px; 
    border: 2px solid #333; background: #000; z-index: 250; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: transform 0.3s;
}
#perf-player-wrap:hover { transform: scale(1.5); transform-origin: bottom right; }

#perf-mode-bar{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:12px 28px;border-bottom:1px solid #111;flex-shrink:0;background:#060606;
}
.mode-btn{
  background:transparent;border:1px solid #2e2e2e;color:#666;
  padding:7px 18px;font-family:inherit;font-size:12px;
  text-transform:uppercase;cursor:pointer;border-radius:4px;
}
.mode-btn.active{border-color:#666;color:#ccc;background:#141414}
#countdown-ring-wrap{
  position:relative;width:36px;height:36px;flex-shrink:0; display:none;
}
#countdown-ring-wrap.visible{display:flex;align-items:center;justify-content:center}
#countdown-ring-svg{position:absolute;inset:0;transform:rotate(-90deg)}
#countdown-ring-text{font-size:11px;font-weight:700;color:#777;position:relative;z-index:1}

#perf-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px 80px;position:relative}
#perf-section-name{ font-size:84px;font-weight:700;letter-spacing:12px;text-transform:uppercase; line-height:1; transition:color 0.4s; }

/* Progress */
#perf-progress{height:4px;background:#0d0d0d;flex-shrink:0}
#perf-progress-fill{height:100%;background:var(--accent);transition:width .12s linear}

#perf-nav{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:16px 28px;border-top:1px solid #111;flex-shrink:0;
}
.p-btn{
  background:#0a0a0a;border:1px solid #2a2a2a;color:#777;
  padding:11px 28px;font-family:inherit;font-size:13px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:5px;
}
.p-btn.big{font-size:16px;padding:12px 44px;letter-spacing:3px;color:#aaa;border-color:#333}

/* ── SAVE INDICATOR ── */
#save-toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:#1a1a1a;border:1px solid var(--border2);
  color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;
  padding:10px 18px;border-radius:5px;
  opacity:0;transform:translateY(6px);
  transition:opacity .2s,transform .2s;pointer-events:none;
}
#save-toast.show{opacity:1;transform:translateY(0)}
#save-toast.saved{border-color:var(--green);color:var(--green)}
</style>
</head>
<body>

<div id="view-auth">
  <div class="auth-box">
    <h2 style="color:var(--accent); letter-spacing: 5px; margin-bottom: 20px;">DRUM CHARTS</h2>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button class="btn accent" style="flex:1" onclick="handleAuth('login')">Login</button>
      <button class="btn" style="flex:1" onclick="handleAuth('signup')">Sign Up</button>
    </div>
    <p id="auth-error" style="color:var(--red); font-size: 13px; margin-top: 15px;"></p>
  </div>
</div>

<div id="view-library">
  <div id="lib-header">
    <div>
      <div id="lib-title">🥁 Drum Charts</div>
      <div id="lib-subtitle">Your song library</div>
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn new-song" onclick="newSong()">+ NEW SONG</button>
        <button class="btn danger" onclick="handleLogout()">Logout</button>
    </div>
  </div>
  <div id="lib-body">
    <div id="lib-empty" style="display:none"><span>🥁</span>No songs yet.</div>
    <div id="song-list"></div>
  </div>
</div>

<div id="view-editor">
  <div id="ed-header">
    <button id="back-btn" onclick="goLibrary()">← Library</button>
    <input id="song-name-input" placeholder="SONG TITLE..." maxlength="50" oninput="saveSongMeta()">
    <div class="ed-header-right">
      <div class="bpm-wrap"><label>BPM</label><input type="number" id="bpm-input" value="120" oninput="saveSongMeta()"></div>
      <button class="btn perform" onclick="startPerf()">▶ PERFORM</button>
    </div>
  </div>

  <div id="yt-sync-bar">
    <label style="font-size: 11px; color: var(--muted); letter-spacing: 1px;">YOUTUBE URL:</label>
    <input id="yt-url-input" placeholder="https://www.youtube.com/watch?v=..." oninput="saveSongMeta()">
  </div>

  <div id="ed-main">
    <div id="sidebar">
      <div class="sidebar-section-label">Modifiers</div>
      <div class="modifier-group">
          <button class="mod-btn" id="mod-pre" onclick="toggleModifier('Pre')">PRE</button>
          <button class="mod-btn" id="mod-post" onclick="toggleModifier('Post')">POST</button>
          <button class="mod-btn active" id="mod-none" onclick="toggleModifier('')">NONE</button>
      </div>
      <div class="sidebar-section-label">Add Section</div>
      <div id="section-palette"></div>
      <div id="sidebar-footer">
        <label style="font-size: 11px; color: var(--muted);">Song Notes</label>
        <textarea id="global-notes" placeholder="Key, feel, gear..." oninput="saveSongMeta()"></textarea>
      </div>
    </div>
    <div id="chart-area">
      <div id="drop-hint">← Click a section to add it</div>
      <div id="chart-list"></div>
    </div>
  </div>
</div>

<div id="perf-overlay">
  <div id="fill-hud"></div>
  <div id="perf-topbar">
    <div id="perf-song">TITLE</div>
    <div style="display:flex; gap:10px;">
        <button class="btn" id="sync-mode-btn" onclick="toggleSyncMode()">SYNC MODE: OFF</button>
        <button class="p-btn" style="padding:5px 12px;font-size:10px" onclick="stopPerf()">✕ EXIT</button>
    </div>
  </div>

  <div id="perf-mode-bar">
    <button class="mode-btn active" id="mode-auto" onclick="setMode('auto')">AUTO</button>
    <button class="mode-btn" id="mode-manual" onclick="setMode('manual')">MANUAL</button>
    <div id="countdown-ring-wrap">
      <svg id="countdown-ring-svg" width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <circle id="ring-arc" cx="16" cy="16" r="13" fill="none" stroke="#555" stroke-width="3"
          stroke-dasharray="81.7" stroke-dashoffset="81.7" stroke-linecap="round"/>
      </svg>
      <span id="countdown-ring-text">-</span>
    </div>
    <div id="auto-status">READY</div>
  </div>

  <div id="perf-body">
    <div id="perf-prev-val" style="color: #222; font-size: 22px; margin-bottom: 20px;">PREVIOUS</div>
    <div id="perf-section-name">SECTION</div>
    <div id="perf-section-sub" style="font-size: 24px; color: #444; margin-top: 10px;">8 BARS</div>
    <div id="perf-notes-disp" style="margin-top: 15px; font-style: italic; color: #666;"></div>
    
    <div id="bar-ticker-wrap">
      <div id="bar-ticker-num">1</div>
      <div id="bar-ticker-label">bar</div>
    </div>
  </div>

  <div id="perf-player-wrap">
      <div id="yt-player-target"></div>
  </div>

  <div id="perf-progress"><div id="perf-progress-fill" style="width:0%"></div></div>

  <div id="perf-nav">
    <button class="p-btn" onclick="perfBack()">← BACK</button>
    <button class="p-btn big" onclick="window.markSectionSync() || perfNext()">NEXT / MARK</button>
  </div>
</div>

<div id="save-toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCdhJhDOeqYlR2xrVVUKXAs7Cms6tiTRJ8",
  authDomain: "chart-maker-firebase.firebaseapp.com",
  projectId: "chart-maker-firebase",
  storageBucket: "chart-maker-firebase.firebasestorage.app",
  messagingSenderId: "892558984",
  appId: "1:892558984:web:9eb403a2b41d6c7299093d",
  measurementId: "G-TV2HYST7DF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───────────────────────────────────────────
let library = [];     
let currentUser = null;
let currentSongId = null;
let activeModifier = '';
let perfIdx = 0;
let syncModeActive = false;

// YouTube API state
let ytPlayer = null;
let ytInterval = null;

// Performance state (Original logic restored)
let perfMode = 'auto'; 
let autoTimer = null;
let barTickInterval = null;
let currentBarTick = 0;
let totalBarTicks  = 0;

const TYPES = [
  {id:'intro',     label:'Intro',      color:'#5bc0de', key:'i'},
  {id:'verse',     label:'Verse',      color:'#4caf6e', key:'v'},
  {id:'pre',       label:'Pre-Chorus', color:'#9b59b6', key:'p'},
  {id:'chorus',    label:'Chorus',     color:'#e8c547', key:'c'},
  {id:'bridge',    label:'Bridge',     color:'#e87d47', key:'b'},
  {id:'solo',      label:'Solo',       color:'#c85a5a', key:'s'},
  {id:'outro',     label:'Outro',      color:'#888',    key:'o'},
  {id:'misc',      label:'Misc',       color:'#aaa',    key:'m'},
];
const TM = {}; TYPES.forEach(t => TM[t.id] = t);

// ─── AUTH CORE ───────────────────────────────────────
window.handleAuth = async (mode) => {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = ""; errEl.classList.remove('shake-err');
    try {
        if(mode === 'login') await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
    } catch(e) { 
        const errorMap = {
            'auth/invalid-email': "That email doesn't look right.",
            'auth/wrong-password': "Wrong password. Give it another shot.",
            'auth/email-already-in-use': "That email is already taken."
        };
        errEl.textContent = errorMap[e.code] || "Something went wrong. Try again.";
        void errEl.offsetWidth; errEl.classList.add('shake-err');
    }
};

window.handleLogout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    const vAuth = document.getElementById('view-auth');
    const vLib = document.getElementById('view-library');
    if (user) {
        currentUser = user;
        vAuth.classList.remove('active'); vLib.classList.add('active');
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) library = docSnap.data().library || [];
        renderLibrary();
    } else {
        currentUser = null;
        vLib.classList.remove('active'); vAuth.classList.add('active');
    }
});

// ─── STORAGE ─────────────────────────────────────────
window.showToast = (msg, type='saved') => {
  const el = document.getElementById('save-toast');
  el.textContent = msg; el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, 1800);
}

window.save = async function(){
  if(currentUser) {
      await setDoc(doc(db, "users", currentUser.uid), { library });
      window.showToast('✓ Synced');
  }
}

// ─── SONG LOGIC ───────────────────────────────────────
window.newSong = () => {
    let s = { id: Date.now(), name: '', bpm: 120, ts: 4, ytUrl: '', notes: '', sections: [] };
    library.push(s); window.save(); window.openSong(s.id);
};

window.openSong = (id) => {
    currentSongId = id;
    const s = library.find(x => x.id === id);
    document.getElementById('song-name-input').value = s.name;
    document.getElementById('bpm-input').value = s.bpm;
    document.getElementById('yt-url-input').value = s.ytUrl || '';
    document.getElementById('global-notes').value = s.notes || '';
    window.showView('editor');
    window.renderChart();
};

window.saveSongMeta = () => {
    const s = library.find(x => x.id === currentSongId);
    if(!s) return;
    s.name = document.getElementById('song-name-input').value;
    s.bpm = parseInt(document.getElementById('bpm-input').value) || 120;
    s.ytUrl = document.getElementById('yt-url-input').value;
    s.notes = document.getElementById('global-notes').value;
    window.save();
};

window.toggleModifier = (m) => {
    activeModifier = m;
    document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mod-' + (m.toLowerCase() || 'none')).classList.add('active');
};

window.addSection = (typeId) => {
    const s = library.find(x => x.id === currentSongId);
    s.sections.push({
        id: Date.now(), typeId, modifier: activeModifier, 
        variant: 'A', bars: 8, repeats: 1, notes: '', 
        color: TM[typeId].color, localTS: s.ts, startTime: 0, hasFill: false
    });
    window.save(); window.renderChart();
};

// ─── SMART NUMBERING SYSTEM ───
function getSectionLabel(sec, index, allSections) {
    let prefix = (sec.modifier ? sec.modifier + '-' : '');
    let base = TM[sec.typeId]?.label || 'Misc';
    let variant = (sec.variant !== 'A' ? ' ' + sec.variant : '');
    
    let count = 0;
    for(let i=0; i<=index; i++) {
        if(allSections[i].typeId === sec.typeId && allSections[i].variant === sec.variant) count++;
    }
    return prefix + base + variant + ' ' + count;
}

window.renderChart = () => {
    const s = library.find(x => x.id === currentSongId);
    const list = document.getElementById('chart-list');
    if(!s) return;
    list.innerHTML = '';
    
    s.sections.forEach((sec, i) => {
        const el = document.createElement('div');
        el.className = 'section-block';
        el.style.animationDelay = (i * 0.05) + 's';
        el.style.borderLeft = `10px solid ${sec.color}`;
        el.innerHTML = `
            <div class="sec-body">
                <div class="sec-row1">
                    <span class="sec-type-label" style="color:${sec.color}">${getSectionLabel(sec, i, s.sections)}</span>
                    <div class="sec-row1-right">
                        <span class="repeat-pill" onclick="window.cycleRepeats(${i})">×${sec.repeats}</span>
                        <input class="bars-input" type="number" value="${sec.bars}" onchange="window.updateBars(${i}, this.value)">
                        <button class="ico-btn" onclick="window.removeSec(${i})">✕</button>
                    </div>
                </div>
                <div class="sec-pro-row">
                    Var: <select class="pro-input" onchange="window.updateVariant(${i}, this.value)">
                        <option value="A" ${sec.variant==='A'?'selected':''}>A</option>
                        <option value="B" ${sec.variant==='B'?'selected':''}>B</option>
                        <option value="C" ${sec.variant==='C'?'selected':''}>C</option>
                    </select>
                    TS: <input type="number" class="pro-input" style="width:40px" value="${sec.localTS || 4}" onchange="window.updateLocalTS(${i}, this.value)">
                    <input type="color" class="pro-input" value="${sec.color}" onchange="window.updateColor(${i}, this.value)">
                    <label class="fill-toggle">
                        <input type="checkbox" ${sec.hasFill?'checked':''} onchange="window.toggleFill(${i})"> Fill?
                    </label>
                    <span style="color:var(--accent); font-size:9px">Sync: ${sec.startTime.toFixed(1)}s</span>
                </div>
                <input class="sec-notes-input" type="text" value="${sec.notes}" placeholder="Riff description..." onchange="window.updateNotes(${i}, this.value)">
            </div>
        `;
        list.appendChild(el);
    });
};

// ─── PERFORMANCE & YOUTUBE HANDS-FREE SYNC ───
window.startPerf = () => {
    const s = library.find(x => x.id === currentSongId);
    if(!s || !s.sections.length) return;
    perfIdx = 0; window.setMode('auto');
    document.getElementById('perf-overlay').classList.add('active');
    document.getElementById('perf-song').textContent = s.name || 'UNTITLED';
    
    if(s.ytUrl) {
        const vidId = s.ytUrl.split('v=')[1]?.split('&')[0];
        if(ytPlayer) ytPlayer.loadVideoById(vidId);
        else window.initYoutube(vidId);
    }
    window.renderPerf();
};

window.initYoutube = (id) => {
    ytPlayer = new YT.Player('yt-player-target', {
        height: '100%', width: '100%', videoId: id,
        events: { 'onStateChange': (e) => {
            if(e.data == YT.PlayerState.PLAYING) ytInterval = setInterval(window.checkSync, 150);
            else clearInterval(ytInterval);
        }}
    });
};

window.checkSync = () => {
    if(syncModeActive || !ytPlayer) return;
    const s = library.find(x => x.id === currentSongId);
    const curTime = ytPlayer.getCurrentTime();
    
    // Auto-advance logic based on timestamps
    let found = -1;
    for(let i = s.sections.length-1; i >= 0; i--) {
        if(curTime >= s.sections[i].startTime) { found = i; break; }
    }
    if(found !== -1 && found !== perfIdx) {
        perfIdx = found; window.renderPerf();
    }
};

window.toggleSyncMode = () => {
    syncModeActive = !syncModeActive;
    document.getElementById('sync-mode-btn').textContent = "SYNC MODE: " + (syncModeActive ? "ON" : "OFF");
    document.getElementById('sync-mode-btn').classList.toggle('accent', syncModeActive);
};

window.markSectionSync = () => {
    if(!syncModeActive || !ytPlayer) return false;
    const s = library.find(x => x.id === currentSongId);
    s.sections[perfIdx].startTime = ytPlayer.getCurrentTime();
    window.showToast('Marked ' + s.sections[perfIdx].typeId);
    window.save(); window.perfNext();
    return true;
};

// ─── PERFORMANCE CORE (RESTORING ORIGINAL LOGIC) ───
window.setMode = (m) => {
  perfMode = m;
  document.getElementById('mode-auto').classList.toggle('active', m==='auto');
  document.getElementById('mode-manual').classList.toggle('active', m==='manual');
  window.clearAuto(); if(m==='auto') window.scheduleAuto();
}

window.clearAuto = () => { if(autoTimer) clearTimeout(autoTimer); if(barTickInterval) clearInterval(barTickInterval); }

window.scheduleAuto = () => {
  const song = library.find(x => x.id === currentSongId);
  const sec = song.sections[perfIdx]; if(!sec) return;
  const bpm = song.bpm; const ts = sec.localTS || 4;
  const beatMs = 60000 / bpm;
  const totalMs = (sec.bars * sec.repeats * ts) * beatMs;

  document.getElementById('countdown-ring-wrap').classList.add('visible');
  currentBarTick = 1; totalBarTicks = sec.bars * sec.repeats;
  window.updateBarTicker();

  barTickInterval = setInterval(() => {
    currentBarTick++; if(currentBarTick > totalBarTicks) currentBarTick = totalBarTicks;
    window.updateBarTicker();
    
    // Fill HUD Trigger: if 2 beats remaining in section
    if(sec.hasFill && currentBarTick === totalBarTicks) document.getElementById('fill-hud').classList.add('active');
  }, beatMs * ts);

  autoTimer = setTimeout(() => {
    document.getElementById('fill-hud').classList.remove('active');
    if(perfIdx < song.sections.length-1){ perfIdx++; window.renderPerf(); window.scheduleAuto(); }
  }, totalMs);

  // Countdown ring animation
  let start = null;
  function anim(ts2){
    if(!start) start = ts2;
    const prog = (ts2 - start) / totalMs;
    if(prog < 1 && autoTimer){ 
        const circ = 81.7;
        document.getElementById('ring-arc').setAttribute('stroke-dashoffset', circ - (circ * prog));
        requestAnimationFrame(anim); 
    }
  }
  requestAnimationFrame(anim);
}

window.updateBarTicker = () => {
    document.getElementById('bar-ticker-num').textContent = currentBarTick;
};

window.renderPerf = () => {
    const s = library.find(x => x.id === currentSongId);
    const sec = s.sections[perfIdx];
    const prev = s.sections[perfIdx-1];
    document.getElementById('perf-section-name').textContent = getSectionLabel(sec, perfIdx, s.sections);
    document.getElementById('perf-section-name').style.color = sec.color;
    document.getElementById('perf-section-sub').textContent = sec.bars + " BARS " + (sec.repeats > 1 ? "×"+sec.repeats : "");
    document.getElementById('perf-notes-disp').textContent = sec.notes;
    document.getElementById('perf-prev-val').textContent = prev ? "PREV: " + getSectionLabel(prev, perfIdx-1, s.sections) : "—";
    document.getElementById('perf-progress-fill').style.width = ((perfIdx+1)/s.sections.length*100)+'%';
};

window.perfNext = () => { window.clearAuto(); if(perfIdx < library.find(x=>x.id===currentSongId).sections.length-1){ perfIdx++; window.renderPerf(); if(perfMode==='auto') window.scheduleAuto(); } };
window.perfBack = () => { window.clearAuto(); if(perfIdx > 0){ perfIdx--; window.renderPerf(); if(perfMode==='auto') window.scheduleAuto(); } };
window.stopPerf = () => { window.clearAuto(); if(ytPlayer) ytPlayer.pauseVideo(); document.getElementById('perf-overlay').classList.remove('active'); };

// ─── HELPERS ───
window.updateBars = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].bars = parseInt(v); window.save(); window.renderChart(); };
window.updateNotes = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].notes = v; window.save(); };
window.updateVariant = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].variant = v; window.save(); window.renderChart(); };
window.updateColor = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].color = v; window.save(); window.renderChart(); };
window.updateLocalTS = (i,v) => { library.find(x=>x.id===currentSongId).sections[i].localTS = parseInt(v); window.save(); window.renderChart(); };
window.toggleFill = (i) => { library.find(x=>x.id===currentSongId).sections[i].hasFill = !library.find(x=>x.id===currentSongId).sections[i].hasFill; window.save(); };
window.removeSec = (i) => { library.find(x=>x.id===currentSongId).sections.splice(i,1); window.save(); window.renderChart(); };
window.cycleRepeats = (i) => { let s = library.find(x=>x.id===currentSongId).sections[i]; s.repeats = (s.repeats % 4) + 1; window.save(); window.renderChart(); };
window.showView = (v) => { document.querySelectorAll('.view').forEach(x=>x.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); };
window.goLibrary = () => { window.saveSongMeta(); window.showView('library'); window.renderLibrary(); };

// Palette Build
const pal = document.getElementById('section-palette');
TYPES.forEach(t => {
    const el = document.createElement('div');
    el.className='palette-item';
    el.innerHTML=`<div class="dot" style="background:${t.color}"></div><span>${t.label}</span>`;
    el.onclick = () => window.addSection(t.id);
    pal.appendChild(el);
});

window.renderLibrary = function(){
  const list = document.getElementById('song-list');
  list.innerHTML = '';
  if(!library.length){ document.getElementById('lib-empty').style.display='block'; return; }
  document.getElementById('lib-empty').style.display='none';
  [...library].reverse().forEach((song, i) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="song-card-left" onclick="window.openSong(${song.id})">
        <div class="song-card-name">${song.name||'Untitled Song'}</div>
        <div class="song-card-meta">${song.bpm} BPM</div>
      </div>
      <button class="btn perform" onclick="event.stopPropagation();window.openAndPerform(${song.id})">▶ Play</button>
    `;
    list.appendChild(card);
  });
}

// Load YouTube API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

// Key Listeners
document.addEventListener('keydown', e => {
  if(!document.getElementById('perf-overlay').classList.contains('active')) return;
  if(e.key===' ' || e.key==='Enter') window.markSectionSync() || window.perfNext();
  if(e.key==='Backspace') window.perfBack();
  if(e.key==='Escape') window.stopPerf();
});
</script>
</body>
