<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Chart Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#161616;
  --bg3:#1f1f1f;
  --bg4:#2a2a2a;
  --bg5:#383838;
  --text:#ede9e0;
  --muted:#999;
  --muted2:#6a6a6a;
  --border:#2e2e2e;
  --border2:#444;
  --accent:#e8c547;
  --green:#4caf6e;
  --red:#c85a5a;
  --blue:#5aafc8;
  font-family:'Courier New',Courier,monospace;
  font-size:16px;
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── CREATIVE UI ANIMATIONS ─── */
@keyframes popIn {
  from { opacity: 0; transform: scale(0.96) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
@keyframes sectionEntrance {
  from { opacity: 0; transform: scale(0.9) translateX(-20px); }
  to { opacity: 1; transform: scale(1) translateX(0); }
}

/* ── VIEWS ── */
#view-library,#view-editor,#view-auth{
    width:100%;height:100%;display:none;flex-direction:column;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#view-library.active,#view-editor.active,#view-auth.active{display:flex; opacity: 1; transform: translateY(0);}

/* ── AUTH UI ── */
#view-auth { justify-content: center; align-items: center; text-align: center; background: var(--bg); }
.auth-box { 
    background: var(--bg2); padding: 40px; border-radius: 12px; border: 1px solid var(--border); 
    width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.auth-input { 
    width: 100%; padding: 12px; margin: 10px 0; background: var(--bg3); 
    border: 1px solid var(--border2); color: var(--text); border-radius: 5px; 
    font-family: inherit; outline: none; transition: border-color 0.2s;
}
.auth-input:focus { border-color: var(--accent); background: var(--bg4); }
.shake-err { animation: shake 0.3s ease-in-out 2; }

/* ── LIBRARY VIEW ── */
#lib-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 36px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#lib-title{font-size:28px;font-weight:700;letter-spacing:5px;color:var(--accent);text-transform:uppercase}
#lib-subtitle{font-size:13px;color:var(--muted);letter-spacing:2px;margin-top:5px}
#lib-body{flex:1;overflow-y:auto;padding:32px 36px}
#lib-body::-webkit-scrollbar{width:5px}
#lib-body::-webkit-scrollbar-thumb{background:var(--border2)}

#lib-empty{
  text-align:center;padding:100px 40px;color:var(--muted2);
  font-size:15px;letter-spacing:2px;text-transform:uppercase;
  border:1px dashed var(--border2);border-radius:8px;margin:20px;
}
#lib-empty span{display:block;font-size:42px;margin-bottom:20px;color:var(--border2)}

.song-card{
  display:flex;align-items:center;gap:20px;
  padding:20px 24px;margin-bottom:10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  cursor:pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideInRight 0.4s ease backwards;
}
.song-card:hover{ 
    background:var(--bg3); border-color:var(--accent); 
    transform: translateX(8px); box-shadow: -4px 0 0 var(--accent);
}
.song-card-left{flex:1;min-width:0}
.song-card-name{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-card-meta{font-size:13px;color:var(--muted);letter-spacing:1px;margin-top:6px}
.song-card-strips{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.song-card-strip{height:8px;border-radius:2px;min-width:14px}
.song-card-actions{display:flex;gap:8px;flex-shrink:0}

/* ── EDITOR VIEW ── */
#ed-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#back-btn{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  padding:9px 16px;font-family:'Courier New',monospace;font-size:13px;
  letter-spacing:1px;cursor:pointer;border-radius:5px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;
}
#back-btn:hover{border-color:var(--accent);color:var(--accent); transform: translateX(-3px); }
#song-name-input{
  background:transparent;border:none;border-bottom:1px solid var(--border2);
  color:var(--accent);font-size:20px;font-weight:700;
  font-family:'Courier New',monospace;letter-spacing:3px;text-transform:uppercase;
  outline:none;flex:1;padding:4px 0;min-width:0;
}
#song-name-input::placeholder{color:var(--muted2)}
#song-name-input:focus{border-bottom-color:var(--accent)}
.ed-header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.bpm-wrap{display:flex;align-items:center;gap:8px}
.bpm-wrap label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
#bpm-input{
  width:68px;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Courier New',monospace;font-size:16px;
  padding:6px 10px;border-radius:5px;text-align:center;outline:none;
}
#bpm-input:focus{border-color:var(--accent)}
.ts-wrap{display:flex;align-items:center;gap:8px}
.ts-wrap label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
#ts-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:'Courier New',monospace;font-size:15px;padding:6px 10px;
  border-radius:5px;outline:none;cursor:pointer;
}
#ts-select:focus{border-color:var(--accent)}

/* ── EDITOR MAIN ── */
#ed-main{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:240px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
.sidebar-section-label{
  padding:14px 16px 10px;font-size:11px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);
}
#section-palette{padding:12px 12px 0}
.palette-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  margin-bottom:4px;border-radius:5px;cursor:pointer;
  font-size:13px;letter-spacing:1px;text-transform:uppercase;
  border:1px solid transparent;transition:all .12s;user-select:none;
}
.palette-item:hover{background:var(--bg3);border-color:var(--border)}
.palette-item .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.palette-item span{flex:1}
.palette-item .key-hint{
  font-size:11px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--muted);padding:2px 7px;border-radius:3px;
}
#sidebar-footer{padding:14px;border-top:1px solid var(--border);margin-top:auto}
#sidebar-footer label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px}
#global-notes{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'Courier New',monospace;font-size:13px;
  padding:10px;resize:none;border-radius:5px;height:90px;outline:none;
  line-height:1.6;
}
#global-notes:focus{border-color:var(--border2)}
#global-notes::placeholder{color:var(--muted2)}

/* ── CHART ── */
#chart-area{flex:1;overflow-y:auto;padding:22px}
#chart-area::-webkit-scrollbar{width:5px}
#chart-area::-webkit-scrollbar-thumb{background:var(--border2)}
#drop-hint{
  text-align:center;color:var(--muted2);font-size:13px;letter-spacing:2px;
  text-transform:uppercase;padding:70px 30px;
  border:1px dashed var(--border2);border-radius:8px;
}
.section-block{
  display:flex;margin-bottom:8px;border-radius:6px;overflow:hidden;
  border:1px solid var(--border);cursor:grab; transition: all 0.2s;
  animation: sectionEntrance 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
.section-block:active{cursor:grabbing}
.section-block.dragging{opacity:.35}
.section-block.drag-over-top{border-top:2px solid var(--accent)}
.section-block.drag-over-bot{border-bottom:2px solid var(--accent)}
.sec-bar{width:8px;flex-shrink:0}
.sec-body{flex:1;padding:12px 16px;background:var(--bg2);min-width:0}
.sec-body:hover{background:var(--bg3)}
.sec-row1{display:flex;align-items:center;gap:12px}
.sec-type-label{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.sec-instance{font-size:12px;opacity:.6;flex-shrink:0}
.sec-row1-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.repeat-pill{
  font-size:11px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--muted);padding:3px 10px;border-radius:10px;cursor:pointer;
  letter-spacing:0;white-space:nowrap;transition:all .12s;
}
.repeat-pill:hover{border-color:var(--accent);color:var(--accent)}
.bars-wrap{display:flex;align-items:center;gap:6px}
.bars-wrap span{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.bars-input{
  width:50px;background:var(--bg4);border:1px solid var(--border2);
  color:var(--text);font-family:'Courier New',monospace;font-size:14px;
  padding:4px 6px;border-radius:4px;text-align:center;outline:none;
}
.bars-input:focus{border-color:var(--accent)}
.sec-actions{display:flex;gap:3px}
.ico-btn{
  background:transparent;border:none;color:var(--muted2);cursor:pointer;
  font-size:16px;padding:4px 6px;border-radius:4px;font-family:'Courier New',monospace;
  transition:all .12s;line-height:1;
}
.ico-btn:hover{color:var(--text);background:var(--bg4)}
.ico-btn.del:hover{color:var(--red)}
.sec-row2{margin-top:7px}
.sec-notes-input{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--border2);color:#bbb;
  font-family:'Courier New',monospace;font-size:13px;
  padding:4px 0;outline:none;transition:border-color .12s;
}
.sec-notes-input:focus{border-color:var(--border2)}
.sec-notes-input::placeholder{color:var(--muted2)}

/* ── BOTTOM BAR ── */
#ed-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-top:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
#chart-stats{font-size:13px;color:var(--muted);letter-spacing:1px}

/* BUTTONS */
.btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:9px 18px;font-size:13px;font-family:'Courier New',monospace;
  cursor:pointer;border-radius:5px;letter-spacing:1px;text-transform:uppercase;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{border-color:var(--accent);color:var(--accent); transform: translateY(-1px); }
.btn.accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.btn.accent:hover{background:#f0d464; color: #000; }
.btn.new-song{background:var(--bg2);border:1px solid var(--border2);color:var(--accent)}
.btn.new-song:hover{background:var(--bg3);border-color:var(--accent)}
.btn.danger{border-color:transparent;color:var(--muted2)}
.btn.danger:hover{color:var(--red);border-color:var(--red)}
.btn.perform{background:var(--green);color:#000;border-color:var(--green);font-weight:700;font-size:15px;padding:9px 24px;letter-spacing:2px}
.btn.perform:hover{background:#5dc880; color: #000; box-shadow: 0 0 15px rgba(76, 175, 110, 0.3); }

/* ═══════════════════════════════
   PERFORMANCE VIEW
═══════════════════════════════ */
#perf-overlay{
  position:fixed;inset:0;background:#000;z-index:200;
  display:none;flex-direction:column;
}
#perf-overlay.active{display:flex; animation: popIn 0.4s ease; }

#perf-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid #1a1a1a;flex-shrink:0;
}
#perf-song{font-size:13px;letter-spacing:3px;color:#555;text-transform:uppercase}
.perf-meta{font-size:13px;color:#555;letter-spacing:2px}

/* AUTO ADVANCE CONTROLS */
#perf-mode-bar{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:12px 28px;border-bottom:1px solid #111;flex-shrink:0;background:#060606;
}
.mode-btn{
  background:transparent;border:1px solid #2e2e2e;color:#666;
  padding:7px 18px;font-family:'Courier New',monospace;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;
  transition:all .15s;
}
.mode-btn.active{border-color:#666;color:#ccc;background:#141414}
.mode-btn:hover{border-color:#555;color:#999}
#auto-status{
  font-size:12px;letter-spacing:2px;color:#555;text-transform:uppercase;
  min-width:180px;text-align:center;
}
#countdown-ring-wrap{
  position:relative;width:36px;height:36px;flex-shrink:0;
  display:none;
}
#countdown-ring-wrap.visible{display:flex;align-items:center;justify-content:center}
#countdown-ring-svg{position:absolute;inset:0;transform:rotate(-90deg)}
#countdown-ring-text{font-size:11px;font-weight:700;color:#777;letter-spacing:0;position:relative;z-index:1}

#perf-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px 80px;position:relative}

/* Prev */
#perf-prev-wrap{margin-bottom:28px;text-align:center;min-height:26px}
#perf-prev-label{font-size:11px;letter-spacing:3px;color:#333;text-transform:uppercase;margin-bottom:5px}
#perf-prev-val{font-size:18px;letter-spacing:4px;color:#3a3a3a;text-transform:uppercase}

/* Current section */
#perf-current-wrap{display:flex;align-items:center;gap:32px;margin-bottom:36px}
#perf-stripe{width:14px;border-radius:3px;transition:background .3s;flex-shrink:0;align-self:stretch;min-height:120px}
#perf-current-center{text-align:center}
#perf-section-name{
  font-size:84px;font-weight:700;letter-spacing:12px;text-transform:uppercase;
  line-height:1;transition:color .25s;
}
#perf-section-sub{
  font-size:20px;color:#666;letter-spacing:4px;margin-top:12px;
}
#perf-notes-disp{
  font-size:16px;color:#777;margin-top:10px;letter-spacing:1px;
  font-style:italic;min-height:22px;
}

/* Next */
#perf-next-wrap{text-align:center;min-height:44px}
#perf-next-label{font-size:11px;letter-spacing:3px;color:#333;text-transform:uppercase;margin-bottom:5px}
#perf-next-val{font-size:22px;letter-spacing:5px;text-transform:uppercase}

/* Position */
#perf-position{
  position:absolute;right:32px;top:50%;transform:translateY(-50%);
  text-align:right;
}
#perf-pos-num{font-size:38px;font-weight:700;color:#2e2e2e;letter-spacing:3px;line-height:1}
#perf-pos-total{font-size:12px;color:#282828;letter-spacing:2px;margin-top:6px}

/* Bar countdown visual */
#bar-ticker-wrap{
  position:absolute;left:32px;top:50%;transform:translateY(-50%);
  text-align:center;
}
#bar-ticker-num{font-size:38px;font-weight:700;color:#2e2e2e;letter-spacing:2px;line-height:1}
#bar-ticker-label{font-size:11px;color:#282828;letter-spacing:2px;text-transform:uppercase;margin-top:6px}

/* Progress */
#perf-progress{height:4px;background:#0d0d0d;flex-shrink:0}
#perf-progress-fill{height:100%;background:var(--accent);transition:width .12s linear}

/* ── LIST VIEW ── */
#perf-list-view{
  flex:1;overflow-y:auto;padding:24px 40px;display:none;
}
#perf-list-view.active{display:block}
#perf-list-view::-webkit-scrollbar{width:5px}
#perf-list-view::-webkit-scrollbar-thumb{background:#2a2a2a}

.pl-row{
  display:flex;align-items:stretch;gap:0;
  margin-bottom:7px;border-radius:6px;overflow:hidden;
  border:1px solid #1e1e1e;transition:all .2s;
  cursor:pointer;
}
.pl-row.pl-current{
  border-color:#4a4a4a;
  box-shadow:0 0 0 1px #4a4a4a;
}
.pl-row.pl-done{opacity:.25}
.pl-swatch{width:7px;flex-shrink:0}
.pl-num{
  width:44px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:13px;color:#3a3a3a;
  background:#0a0a0a;border-right:1px solid #1e1e1e;
  font-weight:700;letter-spacing:1px;
}
.pl-row.pl-current .pl-num{color:#777}
.pl-body{
  flex:1;padding:14px 20px;background:#0f0f0f;
  display:flex;align-items:center;gap:24px;min-width:0;
}
.pl-row.pl-current .pl-body{background:#161616}
.pl-name{
  font-size:20px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;flex-shrink:0;min-width:150px;
  transition:color .2s;
}
.pl-row.pl-done .pl-name{color:#2e2e2e !important}
.pl-meta-col{
  flex-shrink:0;width:110px;font-size:13px;color:#4a4a4a;letter-spacing:1px;
}
.pl-row.pl-current .pl-meta-col{color:#777}
.pl-notes-col{
  flex:1;font-size:14px;color:#4a4a4a;font-style:italic;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  padding-right:16px;
}
.pl-row.pl-current .pl-notes-col{color:#888}
.pl-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.pl-badge{
  font-size:10px;letter-spacing:2px;color:#777;background:#1e1e1e;
  border:1px solid #3a3a3a;padding:4px 10px;border-radius:4px;
  text-transform:uppercase;opacity:0;transition:opacity .2s;
}
.pl-row.pl-current .pl-badge{opacity:1}
.pl-bar-live{font-size:13px;color:#3a3a3a;letter-spacing:1px;min-width:70px;text-align:right}
.pl-row.pl-current .pl-bar-live{color:#666}

/* Nav */
#perf-nav{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:16px 28px;border-top:1px solid #111;flex-shrink:0;
}
.disp-btn{
  background:transparent;border:1px solid #252525;color:#444;
  padding:6px 16px;font-family:'Courier New',monospace;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;
  transition:all .15s;
}
.disp-btn:hover{border-color:#555;color:#888}
.disp-btn.active{border-color:#666;color:#ccc;background:#141414}
.p-btn{
  background:#0a0a0a;border:1px solid #2a2a2a;color:#777;
  padding:11px 28px;font-family:'Courier New',monospace;font-size:13px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:5px;
  transition:all .15s;
}
.p-btn:hover{border-color:#555;color:#bbb}
.p-btn.big{font-size:16px;padding:12px 44px;letter-spacing:3px;color:#aaa;border-color:#333}
.p-btn.big:hover{border-color:#666;color:#ddd}
#key-hint{font-size:11px;color:#2e2e2e;letter-spacing:2px;text-transform:uppercase;text-align:center;padding-bottom:8px}

/* ── SAVE INDICATOR ── */
#save-toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:#1a1a1a;border:1px solid var(--border2);
  color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;
  padding:10px 18px;border-radius:5px;
  opacity:0;transform:translateY(6px);
  transition:opacity .2s,transform .2s;pointer-events:none;
}
#save-toast.show{opacity:1;transform:translateY(0)}
#save-toast.saved{border-color:var(--green);color:var(--green)}
#save-toast.error{border-color:var(--red);color:var(--red)}
.lib-save-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 36px;border-top:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
}
.lib-save-row label{font-size:12px;color:var(--muted2);letter-spacing:1px;flex:1}
</style>
</head>
<body>

<div id="view-auth" class="view">
  <div class="auth-box">
    <h2 style="color:var(--accent); letter-spacing: 5px; margin-bottom: 20px;">DRUM CHARTS</h2>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button class="btn accent" style="flex:1" onclick="handleAuth('login')">Login</button>
      <button class="btn" style="flex:1" onclick="handleAuth('signup')">Sign Up</button>
    </div>
    <p id="auth-error" style="color:var(--red); font-size: 13px; margin-top: 15px; letter-spacing: 1px;"></p>
  </div>
</div>

<div id="view-library" class="view">
  <div id="lib-header">
    <div>
      <div id="lib-title">🥁 Drum Charts</div>
      <div id="lib-subtitle">Your song library</div>
    </div>
    <div style="display:flex; gap:10px">
        <button class="btn new-song" onclick="newSong()">+ NEW SONG</button>
        <button class="btn danger" onclick="handleLogout()">Logout</button>
    </div>
  </div>
  <div class="lib-save-row">
    <label id="save-status-label">Cloud Sync Active</label>
    <button class="btn" onclick="exportLibrary()">⬇ Export All</button>
    <button class="btn" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importLibrary(event)">
  </div>
  <div id="lib-body">
    <div id="lib-empty" style="display:none">
      <span>🥁</span>
      No songs yet — create your first chart
    </div>
    <div id="song-list"></div>
  </div>
</div>

<div id="view-editor" class="view">
  <div id="ed-header">
    <button id="back-btn" class="btn" onclick="goLibrary()">← Library</button>
    <input id="song-name-input" placeholder="SONG TITLE..." maxlength="50" oninput="saveSongMeta()">
    <div class="ed-header-right">
      <div class="bpm-wrap">
        <label>BPM</label>
        <input type="number" id="bpm-input" value="120" min="40" max="300" oninput="saveSongMeta()">
      </div>
      <div class="ts-wrap">
        <label>TIME SIG</label>
        <select id="ts-select" onchange="saveSongMeta()">
          <option value="4">4/4</option>
          <option value="3">3/4</option>
          <option value="6">6/8</option>
          <option value="5">5/4</option>
          <option value="7">7/8</option>
        </select>
      </div>
      <button class="btn perform" onclick="startPerf()">▶ PERFORM</button>
    </div>
  </div>

  <div id="ed-main">
    <div id="sidebar">
      <div class="sidebar-section-label">Add Section</div>
      <div id="section-palette"></div>
      <div id="sidebar-footer">
        <label>Song Notes</label>
        <textarea id="global-notes" placeholder="Key, feel, gear notes..." oninput="saveSongMeta()"></textarea>
      </div>
    </div>
    <div id="chart-area">
      <div id="drop-hint">← Click a section type to add it</div>
      <div id="chart-list"></div>
    </div>
  </div>

  <div id="ed-footer">
    <div id="chart-stats"></div>
    <div style="display:flex;gap:8px">
      <button class="btn danger" onclick="clearChart()">Clear Chart</button>
      <button class="btn danger" onclick="deleteSong()">Delete Song</button>
    </div>
  </div>
</div>

<div id="perf-overlay">
  <div id="perf-topbar">
    <div id="perf-song"></div>
    <div style="display:flex;gap:20px;align-items:center">
      <span class="perf-meta" id="perf-bpm-disp"></span>
      <span class="perf-meta" id="perf-ts-disp"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="disp-btn active" id="disp-focus" onclick="setDisplayMode('focus')" title="Big current-section view">⊡ FOCUS</button>
      <button class="disp-btn" id="disp-list" onclick="setDisplayMode('list')" title="Full song list at a glance">≡ LIST</button>
      <button class="p-btn" style="padding:5px 12px;font-size:10px;margin-left:8px" onclick="stopPerf()">✕ EXIT</button>
    </div>
  </div>

  <div id="perf-mode-bar">
    <button class="mode-btn active" id="mode-auto" onclick="setMode('auto')">AUTO</button>
    <button class="mode-btn" id="mode-manual" onclick="setMode('manual')">MANUAL</button>
    <div id="countdown-ring-wrap">
      <svg id="countdown-ring-svg" width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="13" fill="none" stroke="#1a1a1a" stroke-width="3"/>
        <circle id="ring-arc" cx="16" cy="16" r="13" fill="none" stroke="#555" stroke-width="3"
          stroke-dasharray="81.7" stroke-dashoffset="81.7" stroke-linecap="round"/>
      </svg>
      <span id="countdown-ring-text">-</span>
    </div>
    <div id="auto-status">READY</div>
  </div>

  <div id="perf-body">
    <div id="perf-prev-wrap">
      <div id="perf-prev-label">PREVIOUS</div>
      <div id="perf-prev-val">—</div>
    </div>

    <div id="perf-current-wrap">
      <div id="perf-stripe"></div>
      <div id="perf-current-center">
        <div id="perf-section-name">—</div>
        <div id="perf-section-sub"></div>
        <div id="perf-notes-disp"></div>
      </div>
    </div>

    <div id="perf-next-wrap">
      <div id="perf-next-label">NEXT UP</div>
      <div id="perf-next-val">—</div>
    </div>

    <div id="perf-position">
      <div id="perf-pos-num">1/1</div>
      <div id="perf-pos-total">section</div>
    </div>

    <div id="bar-ticker-wrap">
      <div id="bar-ticker-num">—</div>
      <div id="bar-ticker-label">bar</div>
    </div>
  </div>

  <div id="perf-list-view"></div>

  <div id="perf-progress"><div id="perf-progress-fill" style="width:0%"></div></div>

  <div id="perf-nav">
    <button class="p-btn" onclick="perfBack()">← BACK</button>
    <button class="p-btn big" onclick="perfNext()">NEXT →</button>
  </div>
  <div id="key-hint">SPACE / ENTER = next &nbsp;·&nbsp; BACKSPACE = back &nbsp;·&nbsp; ESC = exit</div>
</div>

<div id="save-toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdhJhDOeqYlR2xrVVUKXAs7Cms6tiTRJ8",
  authDomain: "chart-maker-firebase.firebaseapp.com",
  projectId: "chart-maker-firebase",
  storageBucket: "chart-maker-firebase.firebasestorage.app",
  messagingSenderId: "892558984",
  appId: "1:892558984:web:9eb403a2b41d6c7299093d",
  measurementId: "G-TV2HYST7DF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───────────────────────────────────────────
let library = [];     
let currentUser = null;
let currentSongId = null;
let idCounter = Date.now();
let dragSrc = null;

// Performance state
let perfIdx = 0;
let perfMode = 'auto'; 
let autoTimer = null;
let barTickInterval = null;
let currentBarTick = 0;
let totalBarTicks  = 0;
let displayMode = 'focus';

const TYPES = [
  {id:'intro',     label:'Intro',      color:'#5bc0de', key:'i'},
  {id:'verse',     label:'Verse',      color:'#4caf6e', key:'v'},
  {id:'pre',       label:'Pre-Chorus', color:'#9b59b6', key:'p'},
  {id:'chorus',    label:'Chorus',     color:'#e8c547', key:'c'},
  {id:'bridge',    label:'Bridge',     color:'#e87d47', key:'b'},
  {id:'solo',      label:'Solo',       color:'#c85a5a', key:'s'},
  {id:'breakdown', label:'Breakdown',  color:'#c85a8a', key:'k'},
  {id:'interlude', label:'Interlude',  color:'#48b3a0', key:'l'},
  {id:'outro',     label:'Outro',      color:'#888',    key:'o'},
  {id:'misc',      label:'Misc',       color:'#aaa',    key:'m'},
];
const TM = {};
TYPES.forEach(t => TM[t.id] = t);

// ─── AUTH CORE ───────────────────────────────────────
window.handleAuth = async (mode) => {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = ""; 
    errEl.classList.remove('shake-err');

    try {
        if(mode === 'login') await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
    } catch(e) { 
        const errorMap = {
            'auth/invalid-email': "That email doesn't look right.",
            'auth/user-not-found': "We couldn't find an account with that email.",
            'auth/wrong-password': "Wrong password. Give it another shot.",
            'auth/email-already-in-use': "That email is already taken.",
            'auth/weak-password': "Try a stronger password (at least 6 characters).",
            'auth/missing-password': "Don't forget your password!"
        };
        errEl.textContent = errorMap[e.code] || "Something went wrong. Try again.";
        void errEl.offsetWidth; // trigger reflow
        errEl.classList.add('shake-err');
    }
};

window.handleLogout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    const vAuth = document.getElementById('view-auth');
    const vLib = document.getElementById('view-library');
    if (user) {
        currentUser = user;
        vAuth.classList.remove('active');
        vLib.classList.add('active');
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) {
            library = docSnap.data().library || [];
        }
        renderLibrary();
    } else {
        currentUser = null;
        vLib.classList.remove('active');
        vAuth.classList.add('active');
    }
});

// ─── STORAGE ─────────────────────────────────────────
function showToast(msg, type='saved', duration=1800){
  const el = document.getElementById('save-toast');
  if(!el) return;
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => { el.className = ''; }, duration);
}

window.save = async function(){
  try {
    const json = JSON.stringify(library);
    localStorage.setItem('drumcharts_lib', json);
    if(currentUser) {
        await setDoc(doc(db, "users", currentUser.uid), { library });
    }
    showToast('✓ Synced');
  } catch(e) { showToast('Save failed', 'error'); }
}

window.exportLibrary = function(){
  window.saveSongMeta();
  const data = { version: 1, exported: new Date().toISOString(), library: library };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'drum-charts.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exported');
}

window.importLibrary = function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const incoming = data.library || data;
      if(!Array.isArray(incoming)) return;
      library = [...library, ...incoming];
      window.save();
      renderLibrary();
      showToast('✓ Imported');
    } catch(err) { showToast('Import failed', 'error'); }
  };
  reader.readAsText(file);
}

// ─── APP LOGIC ───────────────────────────────────────
function makeSong(){ return { id: idCounter++, name: '', bpm: 120, ts: 4, notes: '', sections: [], created: Date.now() }; }
function currentSong(){ return library.find(s => s.id === currentSongId) || null; }

window.showView = function(v){
  document.getElementById('view-library').classList.toggle('active', v==='library');
  document.getElementById('view-editor').classList.toggle('active', v==='editor');
}

window.renderLibrary = function(){
  const list = document.getElementById('song-list');
  const empty = document.getElementById('lib-empty');
  list.innerHTML = '';
  if(!library.length){ empty.style.display='block'; return; }
  empty.style.display = 'none';
  [...library].reverse().forEach((song, i) => {
    const totalBars = song.sections.reduce((a,s)=>a+(s.bars*s.repeats),0);
    const strips = song.sections.map(s => `<div class="song-card-strip" style="background:${TM[s.typeId]?.color || '#555'};width:14px"></div>`).join('');
    const card = document.createElement('div');
    card.className = 'song-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="song-card-left" onclick="openSong(${song.id})">
        <div class="song-card-name">${song.name||'Untitled Song'}</div>
        <div class="song-card-meta">${song.bpm} BPM · ${song.ts}/4 · ${totalBars} bars</div>
        <div class="song-card-strips">${strips}</div>
      </div>
      <div class="song-card-actions">
        <button class="btn perform" onclick="event.stopPropagation();openAndPerform(${song.id})">▶ Play</button>
        <button class="btn danger" onclick="event.stopPropagation();deleteSongById(${song.id})">✕</button>
      </div>`;
    list.appendChild(card);
  });
}

window.newSong = function(){
  const song = makeSong();
  library.push(song);
  window.save();
  window.openSong(song.id);
}

window.openSong = function(id){
  currentSongId = id;
  const song = currentSong();
  document.getElementById('song-name-input').value = song.name;
  document.getElementById('bpm-input').value = song.bpm;
  document.getElementById('ts-select').value = String(song.ts);
  document.getElementById('global-notes').value = song.notes;
  window.showView('editor');
  window.renderChart();
}

window.openAndPerform = function(id){ window.openSong(id); setTimeout(window.startPerf, 80); }
window.goLibrary = function(){ window.saveSongMeta(); window.showView('library'); window.renderLibrary(); }

window.saveSongMeta = function(){
  const song = currentSong(); if(!song) return;
  song.name = document.getElementById('song-name-input').value;
  song.bpm  = parseInt(document.getElementById('bpm-input').value)||120;
  song.ts   = parseInt(document.getElementById('ts-select').value)||4;
  song.notes= document.getElementById('global-notes').value;
  window.save();
}

window.deleteSong = function(){ if(confirm('Delete?')){ library = library.filter(s => s.id !== currentSongId); window.save(); window.goLibrary(); } }
window.deleteSongById = function(id){ if(confirm('Delete?')){ library = library.filter(s => s.id !== id); window.save(); window.renderLibrary(); } }
window.clearChart = function(){ if(confirm('Clear?')){ currentSong().sections = []; window.save(); window.renderChart(); } }

// ─── EDITOR ──────────────────────────────────────────
window.addSection = function(typeId){
  const song = currentSong(); if(!song) return;
  song.sections.push({id:idCounter++, typeId, bars:8, notes:'', repeats:1});
  window.save(); window.renderChart();
}

window.renderChart = function(){
  const song = currentSong();
  const list = document.getElementById('chart-list');
  const hint = document.getElementById('drop-hint');
  if(!song){ list.innerHTML=''; return; }
  hint.style.display = song.sections.length ? 'none' : 'block';
  list.innerHTML = '';

  song.sections.forEach((sec, i) => {
    const t = TM[sec.typeId];
    const el = document.createElement('div');
    el.className = 'section-block';
    el.style.animationDelay = (i * 0.05) + 's';
    el.draggable = true;
    el.innerHTML = `
      <div class="sec-bar" style="background:${t.color}"></div>
      <div class="sec-body">
        <div class="sec-row1">
          <span class="sec-type-label" style="color:${t.color}">${t.label}</span>
          <div class="sec-row1-right">
            <span class="repeat-pill" onclick="cycleRepeats(${i})">×${sec.repeats}</span>
            <div class="bars-wrap">
              <input class="bars-input" type="number" value="${sec.bars}" onchange="updateBars(${i},this.value)">
            </div>
            <button class="ico-btn del" onclick="removeSection(${i})">✕</button>
          </div>
        </div>
        <input class="sec-notes-input" type="text" value="${sec.notes}" placeholder="Notes..." onchange="updateNotes(${i},this.value)">
      </div>`;
    list.appendChild(el);
  });

  const totalBars = song.sections.reduce((a,s)=>a+(s.bars*s.repeats),0);
  document.getElementById('chart-stats').textContent = `${song.sections.length} sections · ${totalBars} bars`;
}

// ─── PERFORMANCE CORE ────────────────────────────────
window.startPerf = function(){
  const song = currentSong();
  if(!song || !song.sections.length) return;
  window.saveSongMeta();
  perfIdx = 0;
  document.getElementById('perf-overlay').classList.add('active');
  document.getElementById('perf-song').textContent = song.name || 'UNTITLED';
  document.getElementById('perf-bpm-disp').textContent = song.bpm+' BPM';
  document.getElementById('perf-ts-disp').textContent = song.ts+'/4';
  window.setMode('auto');
  window.setDisplayMode('focus');
  window.renderPerf();
}

window.stopPerf = function(){ clearAuto(); document.getElementById('perf-overlay').classList.remove('active'); }

window.setMode = function(m){
  perfMode = m;
  document.getElementById('mode-auto').classList.toggle('active', m==='auto');
  document.getElementById('mode-manual').classList.toggle('active', m==='manual');
  clearAuto();
  if(m==='auto') scheduleAuto();
}

function clearAuto(){ if(autoTimer) clearTimeout(autoTimer); if(barTickInterval) clearInterval(barTickInterval); }

function scheduleAuto(){
  const song = currentSong(); const sec = song.sections[perfIdx]; if(!sec) return;
  const bpm = song.bpm; const ts = song.ts;
  const beatMs = 60000 / bpm;
  const totalMs = (sec.bars * sec.repeats * ts) * beatMs;

  document.getElementById('countdown-ring-wrap').classList.add('visible');
  
  currentBarTick = 1;
  totalBarTicks = sec.bars * sec.repeats;
  updateBarTicker();

  barTickInterval = setInterval(() => {
    currentBarTick++;
    if(currentBarTick > totalBarTicks) currentBarTick = totalBarTicks;
    updateBarTicker();
  }, beatMs * ts);

  autoTimer = setTimeout(() => {
    if(perfIdx < song.sections.length-1){ perfIdx++; window.renderPerf(); scheduleAuto(); }
  }, totalMs);

  updateRing(0);
  let start = null;
  function anim(ts2){
    if(!start) start = ts2;
    const prog = (ts2 - start) / totalMs;
    if(prog < 1 && autoTimer){ updateRing(prog); requestAnimationFrame(anim); }
  }
  requestAnimationFrame(anim);
}

function updateBarTicker(){
  document.getElementById('bar-ticker-num').textContent = currentBarTick;
  document.getElementById('bar-ticker-label').textContent = 'of '+totalBarTicks;
}

function updateRing(prog){
  const circ = 81.7;
  document.getElementById('ring-arc').setAttribute('stroke-dashoffset', circ - (circ * prog));
}

window.renderPerf = function(){
  const song = currentSong(); const sec = song.sections[perfIdx]; const t = TM[sec.typeId];
  const prev = perfIdx > 0 ? song.sections[perfIdx-1] : null;
  const next = perfIdx < song.sections.length-1 ? song.sections[perfIdx+1] : null;

  document.getElementById('perf-section-name').textContent = t.label.toUpperCase();
  document.getElementById('perf-section-name').style.color = t.color;
  document.getElementById('perf-stripe').style.background = t.color;
  document.getElementById('perf-section-sub').textContent = `${sec.bars} bars ${sec.repeats > 1 ? '×'+sec.repeats : ''}`;
  document.getElementById('perf-notes-disp').textContent = sec.notes;

  document.getElementById('perf-prev-val').textContent = prev ? TM[prev.typeId].label.toUpperCase() : '—';
  document.getElementById('perf-next-val').textContent = next ? TM[next.typeId].label.toUpperCase() : 'END';
  
  document.getElementById('perf-pos-num').textContent = (perfIdx+1)+'/'+song.sections.length;
  document.getElementById('perf-progress-fill').style.width = ((perfIdx+1)/song.sections.length*100)+'%';
}

window.perfNext = () => { clearAuto(); if(perfIdx < currentSong().sections.length-1){ perfIdx++; window.renderPerf(); if(perfMode==='auto') scheduleAuto(); } }
window.perfBack = () => { clearAuto(); if(perfIdx > 0){ perfIdx--; window.renderPerf(); if(perfMode==='auto') scheduleAuto(); } }

window.setDisplayMode = (m) => {
    displayMode = m;
    document.getElementById('disp-focus').classList.toggle('active', m==='focus');
    document.getElementById('disp-list').classList.toggle('active', m==='list');
    document.getElementById('perf-body').style.display = m==='focus' ? 'flex' : 'none';
};

// ─── HELPERS ───
window.updateBars = (i,v) => { currentSong().sections[i].bars = parseInt(v); window.save(); window.renderChart(); }
window.updateNotes = (i,v) => { currentSong().sections[i].notes = v; window.save(); }
window.removeSection = (i) => { currentSong().sections.splice(i,1); window.save(); window.renderChart(); }
window.cycleRepeats = (i) => { currentSong().sections[i].repeats = (currentSong().sections[i].repeats % 8) + 1; window.save(); window.renderChart(); }

// Build Palette
(function(){
  const pal = document.getElementById('section-palette');
  TYPES.forEach(t => {
    const el = document.createElement('div');
    el.className='palette-item';
    el.innerHTML=`<div class="dot" style="background:${t.color}"></div><span>${t.label}</span><span class="key-hint">${t.key.toUpperCase()}</span>`;
    el.onclick = () => window.addSection(t.id);
    pal.appendChild(el);
  });
})();

document.addEventListener('keydown', e => {
  if(!document.getElementById('perf-overlay').classList.contains('active')) return;
  if(e.key===' ' || e.key==='Enter') window.perfNext();
  if(e.key==='Backspace') window.perfBack();
  if(e.key==='Escape') window.stopPerf();
});
</script>
</body>
</html>
